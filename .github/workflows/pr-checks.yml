name: PR Checks

on:
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.10"

jobs:
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ --ignore=tests/integration \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Ruff check
        working-directory: backend
        run: ruff check app/ tests/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/ tests/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Soft default: STRICT_STU6=0 for rollout week. Flip to 1 once all connectathon measures pass in CI.
      STRICT_STU6: "0"
      USE_PREBAKED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: |
          ./scripts/run-integration-tests.sh \
            --ignore=tests/integration/test_golden_measures.py \
            --ignore=tests/integration/test_connectathon_measures.py \
            --ignore=tests/integration/test_full_workflow.py \
            --durations=25 \
            2>&1 | tee /tmp/test-output.txt
          STATUS=${PIPESTATUS[0]}
          echo "## Integration Test Timings" >> "$GITHUB_STEP_SUMMARY"
          grep -A 200 'slowest durations' /tmp/test-output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          exit $STATUS

  script-security-lint:
    name: Script Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Reject set -x in prod scripts
        run: |
          # set -x traces every command to stderr; any in-scope secret variable
          # gets written to the systemd journal and CI logs.
          if grep -rn 'set -x' scripts/ --include='*.sh' \
              | grep -v 'scripts/tests/' | grep -v '#.*set -x'; then
            echo "ERROR: set -x found in scripts/ — remove it (leaks secrets to logs)"
            exit 1
          fi
          echo "OK: no set -x in scripts/"

      - name: Reject variable expansion of PASSWORD in echo/printf
        run: |
          # Match only when the $PASSWORD variable itself is being expanded —
          # not when the word "PASSWORD" appears in a literal log message.
          if grep -rn -E '(echo|printf)[^#]*\$\{?POSTGRES_PASSWORD' scripts/ --include='*.sh' \
              | grep -v 'scripts/tests/'; then
            echo "ERROR: \$POSTGRES_PASSWORD expanded in echo/printf in scripts/ — redact before logging"
            exit 1
          fi
          echo "OK: no \$POSTGRES_PASSWORD expansion in echo/printf in scripts/"

      - name: Bash unit tests
        run: bash scripts/tests/run_tests.sh

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
