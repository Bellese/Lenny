name: Test and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: read  # required for GHCR pull on EC2 (token relayed via SSM SecureString)

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.10"

      - name: Run backend unit tests
        working-directory: backend
        run: |
          pip install -r requirements.txt -r requirements-test.txt
          python -m pytest tests/ --ignore=tests/integration --cov=app --cov-fail-under=70 -v

      - name: Check frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Break-glass: SSH secrets (EC2_HOST, EC2_USER, EC2_SSH_KEY) retained for
      # manual access — not used in automated deploy.

      - name: Configure AWS credentials (OIDC)
        if: success()
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: arn:aws:iam::439475769170:role/leonard-github-deploy
          aws-region: us-east-1

      - name: Stage GHCR pull token in SSM
        # Writes the workflow's GITHUB_TOKEN to SSM as a SecureString so the
        # EC2 deploy script can `docker login ghcr.io` to pull pre-baked HAPI
        # images. The token is short-lived (workflow run TTL, ~1h) and removed
        # by the cleanup step below regardless of deploy outcome.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          aws ssm put-parameter \
            --name "/leonard/prod/GHCR_TOKEN" \
            --value "$GH_TOKEN" \
            --type "SecureString" \
            --overwrite \
            --region us-east-1 >/dev/null
          echo "Staged ephemeral GHCR pull token in /leonard/prod/GHCR_TOKEN"

      - name: Deploy via SSM Run Command
        if: success()
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-0f00585639d2f3ef1" \
            --document-name "leonard-deploy" \
            --timeout-seconds 900 \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/leonard/deploy" \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)
          echo "SSM command ID: $COMMAND_ID"

          STATUS="Pending"
          for i in $(seq 1 64); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-0f00585639d2f3ef1" \
              --query "Status" --output text --region us-east-1 2>/dev/null || echo "Pending")
            echo "[$i/64] Status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "i-0f00585639d2f3ef1" \
                  --region us-east-1 \
                  --query "StandardOutputContent" --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "i-0f00585639d2f3ef1" \
                  --region us-east-1 \
                  --query "StandardErrorContent" --output text || true
                echo "Deploy command failed with status: $STATUS"
                exit 1 ;;
            esac
            sleep 15
          done

          if [[ "$STATUS" != "Success" ]]; then
            echo "Deploy timed out waiting for SSM command $COMMAND_ID (final status: $STATUS)" >&2
            exit 1
          fi

      - name: Remove staged GHCR pull token from SSM
        # Always-run cleanup. Token is unusable after workflow ends anyway
        # (~1h TTL), but we remove it so a static read of SSM never reveals
        # an active credential between deploys.
        if: always()
        run: |
          aws ssm delete-parameter \
            --name "/leonard/prod/GHCR_TOKEN" \
            --region us-east-1 2>/dev/null || true
          echo "Cleared /leonard/prod/GHCR_TOKEN"

      - name: Health check
        if: success()
        run: |
          for i in $(seq 1 24); do
            curl -fsS "https://api.98-89-219-217.nip.io/health" >/dev/null 2>&1 && break
            [[ "$i" == "24" ]] && { echo "Health check failed after 2 min"; exit 1; }
            sleep 5
          done
          echo "Deploy verified: https://api.98-89-219-217.nip.io/health is healthy"
