name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # Tests + frontend build run on every PR via .github/workflows/pr-checks.yml.
      # Branch protection requires "branch up-to-date with main" before merge, so
      # the squashed commit on main is byte-identical to the PR tip and re-running
      # the same tests here adds ~5 min and zero marginal safety. The post-deploy
      # `Health check` step is the real production smoke test.

      # Break-glass: SSH secrets (EC2_HOST, EC2_USER, EC2_SSH_KEY) retained for
      # manual access — not used in automated deploy.

      - name: Configure AWS credentials (OIDC)
        if: success()
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          role-to-assume: arn:aws:iam::439475769170:role/leonard-github-deploy
          aws-region: us-east-1

      - name: Deploy via SSM Run Command
        if: success()
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-0f00585639d2f3ef1" \
            --document-name "leonard-deploy" \
            --timeout-seconds 900 \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/leonard/deploy" \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)
          echo "SSM command ID: $COMMAND_ID"

          STATUS="Pending"
          for i in $(seq 1 64); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-0f00585639d2f3ef1" \
              --query "Status" --output text --region us-east-1 2>/dev/null || echo "Pending")
            echo "[$i/64] Status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "i-0f00585639d2f3ef1" \
                  --region us-east-1 \
                  --query "StandardOutputContent" --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "i-0f00585639d2f3ef1" \
                  --region us-east-1 \
                  --query "StandardErrorContent" --output text || true
                echo "Deploy command failed with status: $STATUS"
                exit 1 ;;
            esac
            sleep 15
          done

          if [[ "$STATUS" != "Success" ]]; then
            echo "Deploy timed out waiting for SSM command $COMMAND_ID (final status: $STATUS)" >&2
            exit 1
          fi

      - name: Health check
        if: success()
        run: |
          for i in $(seq 1 24); do
            curl -fsS "https://api.lenny.bellese.dev/health" >/dev/null 2>&1 && break
            [[ "$i" == "24" ]] && { echo "Health check failed after 2 min"; exit 1; }
            sleep 5
          done
          echo "Deploy verified: https://api.lenny.bellese.dev/health is healthy"
