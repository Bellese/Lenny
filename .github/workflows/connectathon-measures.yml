name: Connectathon Measures

# Non-blocking: runs weekly and on manual trigger.
# The source-of-truth integration suite is too slow for the PR gate, so it runs
# once a week here and can be triggered manually for large changes.
#
# Job split:
#   - bundle-loader-test: vanilla HAPI; validates load_connectathon_bundles() end-to-end
#     (test_smart_load.py).  Must run on vanilla HAPI — pre-baked images skip these
#     tests since the data is already loaded.
#   - connectathon-eval: pre-baked HAPI; golden isolation + full connectathon coverage
#     (test_golden_measures.py + test_connectathon_measures.py).  Pre-baked images make
#     PUT uploads idempotent/fast; eval-gate + 568 connectathon evals dominate the clock.
#   - jobs-pipeline-validation: pre-baked HAPI; runs all 11 measures through Lenny's
#     Jobs API and validates per-patient numerator/denominator outputs against ground-truth
#     expected populations from the connectathon bundles.  Closes the gap between
#     test_connectathon_measures.py (bypasses Lenny) and test_full_workflow.py (no count
#     assertions).  Requires Groups pre-loaded in CDR (prebaked image only).
#   - full-workflow: orchestration end-to-end coverage in a clean runner so it does not
#     inherit the connectathon-loaded CDR state.
#
# When STRICT_STU6 flips to "1" the connectathon-eval job will hard-fail on
# population mismatches, giving a weekly signal of connectathon readiness.

on:
  schedule:
    - cron: "0 3 * * 1"   # 03:00 UTC Monday weekly
  workflow_dispatch:
    inputs:
      strict_stu6:
        description: "STRICT_STU6 value (0=warn, 1=hard-fail)"
        required: false
        default: "0"

env:
  PYTHON_VERSION: "3.10"

jobs:
  bundle-loader-test:
    name: Bundle Loader Test (vanilla HAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Validates load_connectathon_bundles() end-to-end: manifest integrity, SHA256,
    # bundle upload, canonical URL resolution, and ExpectedResult row counts.
    # Must run on vanilla HAPI — when HAPI_PREBAKED=1 these tests skip themselves.
    # Runtime: cold HAPI startup + full 12-bundle upload via load_connectathon_bundles()
    # (no cross-bundle VS deduplication, slower than the fixture path) + static checks.
    # Empirical: Apr 27 run hit the 90-min wall; 120 min matches the original monolithic
    # source-of-truth budget and gives headroom for slow runners.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run bundle-loader integration tests (vanilla HAPI)
        run: ./scripts/run-integration-tests.sh tests/integration/test_smart_load.py

  connectathon-eval:
    name: Connectathon Eval (pre-baked HAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Runs golden isolation and full connectathon coverage against pre-baked images.
    # Pre-baked images already contain all 12 bundles; PUT uploads are fast idempotent
    # upserts.  Clock is dominated by eval-gate (≤600s) + 568 connectathon evals.
    # verify-bake (superset) finishes in ~45 min — 60 min is safe headroom.
    env:
      STRICT_STU6: ${{ github.event.inputs.strict_stu6 || '0' }}
      USE_PREBAKED: "1"
      REQUIRE_PREBAKED: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run golden + connectathon eval tests (pre-baked HAPI)
        run: >-
          ./scripts/run-integration-tests.sh
          tests/integration/test_golden_measures.py
          tests/integration/test_connectathon_measures.py

  jobs-pipeline-validation:
    name: Jobs Pipeline Validation (pre-baked HAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Validates Lenny's orchestration layer end-to-end: runs all 7 connectathon measures
    # through the Jobs API and asserts per-patient numerator/denominator outputs match the
    # ground-truth expected populations from the connectathon bundles.
    # Requires prebaked CDR (has FHIR Groups per measure_id) — skips on vanilla HAPI.
    env:
      USE_PREBAKED: "1"
      REQUIRE_PREBAKED: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Jobs pipeline validation (pre-baked HAPI)
        run: ./scripts/run-integration-tests.sh tests/integration/test_full_jobs_pipeline.py

  full-workflow:
    name: Full Workflow (clean nightly run)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run weekly full workflow integration test in isolation
        run: ./scripts/run-integration-tests.sh tests/integration/test_full_workflow.py
