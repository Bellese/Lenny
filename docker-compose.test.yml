# Test-specific Docker Compose — spins up only infrastructure needed for
# integration tests.  No frontend, backend, or seed service.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest -m integration
#   docker compose -f docker-compose.test.yml down -v

services:
  db:
    image: postgres:16-alpine
    ports: ["5433:5432"]
    volumes: ["test_pgdata:/var/lib/postgresql/data"]
    environment:
      - POSTGRES_DB=mct2
      - POSTGRES_USER=mct2
      - POSTGRES_PASSWORD=mct2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mct2"]
      interval: 5s
      timeout: 3s
      retries: 5

  hapi-fhir-cdr:
    image: hapiproject/hapi:v7.6.0
    ports: ["8180:8080"]
    volumes: ["test_cdrdata:/data/hapi"]
    environment:
      - hapi.fhir.server_address=http://hapi-fhir-cdr:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0

  hapi-fhir-measure:
    image: hapiproject/hapi:v7.6.0
    ports: ["8181:8080"]
    volumes: ["test_measuredata:/data/hapi"]
    environment:
      - hapi.fhir.server_address=http://hapi-fhir-measure:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0

volumes:
  test_pgdata:
  test_cdrdata:
  test_measuredata:
