# Test-specific Docker Compose — spins up only infrastructure needed for
# integration tests.  No frontend, backend, or seed service.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest -m integration
#   docker compose -f docker-compose.test.yml down -v

services:
  db:
    image: postgres:16-alpine
    ports: ["5433:5432"]
    volumes: ["test_pgdata:/var/lib/postgresql/data"]
    environment:
      - POSTGRES_DB=mct2
      - POSTGRES_USER=mct2
      - POSTGRES_PASSWORD=mct2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mct2"]
      interval: 5s
      timeout: 3s
      retries: 5

  hapi-fhir-cdr:
    image: hapiproject/hapi:v8.8.0-1
    user: root
    ports: ["8180:8080"]
    volumes: ["test_cdrdata:/data/hapi"]
    environment:
      # QI-Core STU6 IG packages
      - hapi.fhir.implementationguides.qicore.name=hl7.fhir.us.qicore
      - hapi.fhir.implementationguides.qicore.version=6.0.0
      - hapi.fhir.implementationguides.uscore.name=hl7.fhir.us.core
      - hapi.fhir.implementationguides.uscore.version=6.1.0
      - hapi.fhir.implementationguides.cql.name=hl7.fhir.uv.cql
      - hapi.fhir.implementationguides.cql.version=1.0.0
      - hapi.fhir.server_address=http://localhost:8180/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - hapi.fhir.client_id_strategy=ANY
      - hapi.fhir.allow_external_references=true
      - hapi.fhir.enforce_referential_integrity_on_write=false
      # Raise in-memory ValueSet expansion cap above HAPI default of 1000.
      # Connectathon bundles contain ValueSets with >1000 codes (e.g. 1797); without
      # this, HAPI throws HAPI-0831 during CQL retrieves and $evaluate-measure returns IP=0.
      - hapi.fhir.maximum_expansion_size=50000
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver

  hapi-fhir-measure:
    image: hapiproject/hapi:v8.8.0-1
    user: root
    ports: ["8181:8080"]
    volumes: ["test_measuredata:/data/hapi"]
    environment:
      # QI-Core STU6 IG packages
      - hapi.fhir.implementationguides.qicore.name=hl7.fhir.us.qicore
      - hapi.fhir.implementationguides.qicore.version=6.0.0
      - hapi.fhir.implementationguides.uscore.name=hl7.fhir.us.core
      - hapi.fhir.implementationguides.uscore.version=6.1.0
      - hapi.fhir.implementationguides.cql.name=hl7.fhir.uv.cql
      - hapi.fhir.implementationguides.cql.version=1.0.0
      - hapi.fhir.server_address=http://localhost:8181/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - hapi.fhir.client_id_strategy=ANY
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.search.enabled=true
      - spring.jpa.properties.hibernate.search.backend.type=lucene
      - spring.jpa.properties.hibernate.search.backend.analysis.configurer=ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurers$$HapiLuceneAnalysisConfigurer
      - spring.jpa.properties.hibernate.search.backend.directory.root=/data/hapi/lucene
      - spring.jpa.properties.hibernate.search.backend.lucene_version=LUCENE_CURRENT
      - spring.jpa.properties.hibernate.search.backend.io.refresh_interval=100
      - hapi.fhir.reuse_cached_search_results_millis=${HAPI_REUSE_SEARCH_CACHE_MS:-0}
      - hapi.fhir.client_id_strategy=ANY
      - hapi.fhir.allow_external_references=true
      - hapi.fhir.cr.enabled=true
      - hapi.fhir.enforce_referential_integrity_on_write=false
      - hapi.fhir.maximum_expansion_size=50000

volumes:
  test_pgdata:
  test_cdrdata:
  test_measuredata:
