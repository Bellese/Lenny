services:
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: https://api.${CADDY_HOST}

  backend:
    restart: unless-stopped
    environment:
      ALLOWED_ORIGINS: https://${CADDY_HOST}
    secrets:
      - postgres_password
    ulimits:
      core:
        soft: 0
        hard: 0
    volumes:
      - ./seed/connectathon-bundles:/seed/connectathon-bundles:ro

  db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password

  hapi-fhir-cdr:
    restart: unless-stopped

  hapi-fhir-measure:
    restart: unless-stopped

  caddy:
    restart: unless-stopped
    image: caddy:2-alpine
    ports: ["80:80", "443:443", "443:443/udp"]
    environment:
      CADDY_HOST: ${CADDY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

secrets:
  postgres_password:
    file: /run/leonard/POSTGRES_PASSWORD

volumes:
  caddy_data:
  caddy_config:
