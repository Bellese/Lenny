services:
  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: https://api.${CADDY_HOST}

  backend:
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mct2:${POSTGRES_PASSWORD}@db:5432/mct2
      ALLOWED_ORIGINS: https://${CADDY_HOST}
    volumes:
      - ./seed/connectathon-bundles:/seed/connectathon-bundles:ro

  db:
    restart: unless-stopped

  hapi-fhir-cdr:
    restart: unless-stopped

  hapi-fhir-measure:
    restart: unless-stopped

  caddy:
    restart: unless-stopped
    image: caddy:2-alpine
    ports: ["80:80", "443:443", "443:443/udp"]
    environment:
      CADDY_HOST: ${CADDY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
