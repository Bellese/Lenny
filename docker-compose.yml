services:
  frontend:
    build: ./frontend
    ports: ["3001:3001"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - ./seed/connectathon-bundles:/seed/connectathon-bundles:ro
    depends_on:
      db:
        condition: service_healthy
      hapi-fhir-cdr:
        condition: service_started
      hapi-fhir-measure:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://mct2:mct2@db:5432/mct2
      - MEASURE_ENGINE_URL=http://hapi-fhir-measure:8080/fhir
      - DEFAULT_CDR_URL=http://hapi-fhir-cdr:8080/fhir
      - CONNECTATHON_BUNDLES_DIR=/seed/disabled-connectathon-bundles # Manual uploads exercise HAPI sync; don't gate health on startup replay.
      - PATIENT_DATA_STRATEGY=${PATIENT_DATA_STRATEGY:-batch}
      - VALUESET_RELOAD_MODE=${VALUESET_RELOAD_MODE:-delete}
      - HAPI_SYNC_AFTER_UPLOAD=${HAPI_SYNC_AFTER_UPLOAD:-true}
      - CDR_FERNET_KEY=${CDR_FERNET_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  db:
    image: postgres:16-alpine
    volumes: ["pgdata:/var/lib/postgresql/data"]
    environment:
      - POSTGRES_DB=mct2
      - POSTGRES_USER=mct2
      - POSTGRES_PASSWORD=mct2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mct2"]
      interval: 5s
      timeout: 3s
      retries: 5

  hapi-fhir-cdr:
    image: ${HAPI_CDR_IMAGE:-hapiproject/hapi:v8.8.0-1}
    user: root
    ports: ["8081:8080"]
    volumes: ["cdrdata:/data/hapi"]
    mem_limit: 2g
    environment:
      # QI-Core STU6 IG packages
      - hapi.fhir.implementationguides.qicore.name=hl7.fhir.us.qicore
      - hapi.fhir.implementationguides.qicore.version=6.0.0
      - hapi.fhir.implementationguides.uscore.name=hl7.fhir.us.core
      - hapi.fhir.implementationguides.uscore.version=6.1.0
      - hapi.fhir.implementationguides.cql.name=hl7.fhir.uv.cql
      - hapi.fhir.implementationguides.cql.version=1.0.0
      - hapi.fhir.server_address=http://hapi-fhir-cdr:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - hapi.fhir.reuse_cached_search_results_millis=0
      - hapi.fhir.client_id_strategy=ANY
      - hapi.fhir.allow_external_references=true
      - hapi.fhir.enforce_referential_integrity_on_write=false
      - hapi.fhir.maximum_expansion_size=50000 # Connectathon ValueSets exceed HAPI's default expansion limit.
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.search.indexing.plan.synchronization.strategy=sync
      - JAVA_TOOL_OPTIONS=-Xmx1g -Xms256m

  hapi-fhir-measure:
    image: ${HAPI_MEASURE_IMAGE:-hapiproject/hapi:v8.8.0-1}
    user: root
    ports: ["8080:8080"]
    volumes: ["measuredata:/data/hapi"]
    mem_limit: 3g
    environment:
      # QI-Core STU6 IG packages
      - hapi.fhir.implementationguides.qicore.name=hl7.fhir.us.qicore
      - hapi.fhir.implementationguides.qicore.version=6.0.0
      - hapi.fhir.implementationguides.uscore.name=hl7.fhir.us.core
      - hapi.fhir.implementationguides.uscore.version=6.1.0
      - hapi.fhir.implementationguides.cql.name=hl7.fhir.uv.cql
      - hapi.fhir.implementationguides.cql.version=1.0.0
      - hapi.fhir.server_address=http://hapi-fhir-measure:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - hapi.fhir.reuse_cached_search_results_millis=0
      - hapi.fhir.client_id_strategy=ANY
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.allow_external_references=true # Match integration harness; bundles reference external canonicals.
      - hapi.fhir.cr.enabled=true
      - hapi.fhir.enforce_referential_integrity_on_write=false # Match harness; MADiE bundles can omit referenced resources.
      - hapi.fhir.maximum_expansion_size=50000 # Connectathon ValueSets exceed HAPI's default expansion limit.
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.search.enabled=true
      - spring.jpa.properties.hibernate.search.backend.type=lucene
      - spring.jpa.properties.hibernate.search.backend.analysis.configurer=ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurers$$HapiLuceneAnalysisConfigurer
      - spring.jpa.properties.hibernate.search.backend.directory.root=/data/hapi/lucene
      - spring.jpa.properties.hibernate.search.backend.lucene_version=LUCENE_CURRENT
      - spring.jpa.properties.hibernate.search.backend.io.refresh_interval=100 # Reduce HAPI search-index lag after uploads.
      - spring.jpa.properties.hibernate.search.indexing.plan.synchronization.strategy=sync
      - JAVA_TOOL_OPTIONS=-Xmx1500m -Xms256m

  seed:
    build: ./seed
    depends_on:
      hapi-fhir-cdr:
        condition: service_started
      hapi-fhir-measure:
        condition: service_started
    environment:
      - CDR_URL=http://hapi-fhir-cdr:8080/fhir
      - MEASURE_URL=http://hapi-fhir-measure:8080/fhir
      - SEED_DIR=/seed
    volumes:
      - ./seed/connectathon-bundles:/seed/connectathon-bundles:ro
    restart: "no"

volumes:
  pgdata:
  cdrdata:
  measuredata:
