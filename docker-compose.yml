services:
  frontend:
    build: ./frontend
    ports: ["3001:3001"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      hapi-fhir-cdr:
        condition: service_started
      hapi-fhir-measure:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://mct2:mct2@db:5432/mct2
      - MEASURE_ENGINE_URL=http://hapi-fhir-measure:8080/fhir
      - DEFAULT_CDR_URL=http://hapi-fhir-cdr:8080/fhir
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  db:
    image: postgres:16-alpine
    volumes: ["pgdata:/var/lib/postgresql/data"]
    environment:
      - POSTGRES_DB=mct2
      - POSTGRES_USER=mct2
      - POSTGRES_PASSWORD=mct2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mct2"]
      interval: 5s
      timeout: 3s
      retries: 5

  hapi-fhir-cdr:
    image: hapiproject/hapi:v7.4.0
    user: root
    volumes: ["cdrdata:/data/hapi"]
    environment:
      - hapi.fhir.server_address=http://hapi-fhir-cdr:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect

  hapi-fhir-measure:
    image: hapiproject/hapi:v7.4.0
    user: root
    volumes: ["measuredata:/data/hapi"]
    environment:
      - hapi.fhir.server_address=http://hapi-fhir-measure:8080/fhir
      - hapi.fhir.defer_indexing_for_codesystems_of_size=0
      - hapi.fhir.cr.enabled=true
      - spring.datasource.url=jdbc:h2:file:/data/hapi/h2;DB_CLOSE_ON_EXIT=FALSE
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect

  seed:
    build: ./seed
    depends_on:
      hapi-fhir-cdr:
        condition: service_started
      hapi-fhir-measure:
        condition: service_started
    environment:
      - CDR_URL=http://hapi-fhir-cdr:8080/fhir
      - MEASURE_URL=http://hapi-fhir-measure:8080/fhir
      - SEED_DIR=/seed
    restart: "no"

volumes:
  pgdata:
  cdrdata:
  measuredata:
